# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "b45929a097e4af2198f5fea412a7a1ed"
name = "Presswall"
application_url = "https://reissue-irritable-slider.ngrok-free.dev"
embedded = true

[build]
# HARD RULE: never true. When true, `shopify app dev` rewrites Partner
# Application URL / redirects / app proxy to the tunnel for *all* installs.
# Store-only dev preview still works with false; cleanup via scripts/shopify-app-dev.sh.
automatically_update_urls_on_dev = false
dev_store_url = "noxify-dvgwvtrt.myshopify.com"

[access_scopes]
scopes = "write_app_proxy,read_themes"

[auth]
redirect_urls = [
  "https://reissue-irritable-slider.ngrok-free.dev/api/auth/callback"
]

[shop.metafields.app.storefront_config]
type = "json"
name = "Storefront config"
access.admin = "merchant_read_write"
access.storefront = "public_read"

[app_proxy]
url = "/api/proxy"
subpath = "presswall"
prefix = "apps"

[webhooks]
api_version = "2025-01"

[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "/api/webhooks"

[[webhooks.subscriptions]]
compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
uri = "/api/webhooks"

[pos]
embedded = false
