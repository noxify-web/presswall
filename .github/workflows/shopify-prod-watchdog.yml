# Keeps the dev store off dead tunnels so ERR_NGROK_3200 cannot stick.
#
# Required repo secret (set via gh):
#   gh secret set SHOPIFY_CLI_PARTNERS_TOKEN -R noxify-web/presswall
#
# Create a Partner API client token (Partners dashboard → Settings → Partner
# API clients) with App Management access. An expired/wrong token used to fail
# every 20 minutes and spam GitHub failure emails — CLI errors are warnings.
#
# Behavior:
#   - Every run (push main / every 20 min / manual): clear store dev preview
#   - Daily 06:00 UTC + manual with restore_urls: also redeploy -c prod
name: Shopify prod watchdog

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/20 * * * *"
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      restore_urls:
        description: Also redeploy prod Partner URLs (shopify.app.prod.toml)
        type: boolean
        default: true

concurrency:
  group: shopify-prod-watchdog
  cancel-in-progress: false

jobs:
  watchdog:
    name: Clean store (+ optional URL restore)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require Partner token
        id: token
        env:
          SHOPIFY_CLI_PARTNERS_TOKEN: ${{ secrets.SHOPIFY_CLI_PARTNERS_TOKEN }}
        run: |
          if [ -z "${SHOPIFY_CLI_PARTNERS_TOKEN}" ]; then
            echo "::warning::SHOPIFY_CLI_PARTNERS_TOKEN is not set. Watchdog cannot clear store previews."
            echo "present=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "present=true" >> "$GITHUB_OUTPUT"

      - name: Setup Shopify CLI
        if: steps.token.outputs.present == 'true'
        run: npm install -g @shopify/cli@latest

      - name: Clear development-store tunnel preview
        if: steps.token.outputs.present == 'true'
        env:
          SHOPIFY_CLI_PARTNERS_TOKEN: ${{ secrets.SHOPIFY_CLI_PARTNERS_TOKEN }}
          DEV_STORE: noxify-dvgwvtrt.myshopify.com
        run: |
          set +e
          echo "Cleaning store preview on ${DEV_STORE}..."
          shopify app dev clean -c prod -s "$DEV_STORE" --path .
          code=$?
          if [ "$code" -ne 0 ]; then
            echo "::warning::shopify app dev clean failed (exit ${code}). Token may be expired or lack App Management access — rotate SHOPIFY_CLI_PARTNERS_TOKEN. Local cleanup still works via bun run shopify:end-dev."
            exit 0
          fi
          echo "Store preview cleared — store uses released prod app."

      - name: Redeploy production Partner URLs
        if: >
          steps.token.outputs.present == 'true' &&
          (github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'schedule' && github.event.schedule == '0 6 * * *'))
        env:
          SHOPIFY_CLI_PARTNERS_TOKEN: ${{ secrets.SHOPIFY_CLI_PARTNERS_TOKEN }}
        run: |
          set +e
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.restore_urls }}" != "true" ]]; then
            echo "Skipping Partner URL redeploy (restore_urls=false)."
            exit 0
          fi
          shopify app deploy -c prod --allow-updates \
            --message "CI watchdog: restore production app URLs to presswall.noxify.io" \
            --path .
          code=$?
          if [ "$code" -ne 0 ]; then
            echo "::warning::shopify app deploy failed (exit ${code}). Rotate SHOPIFY_CLI_PARTNERS_TOKEN or run: bun run shopify:deploy:prod"
            exit 0
          fi
